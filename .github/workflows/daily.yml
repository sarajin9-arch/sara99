name: AI 교육 다이제스트 — 매일 오전 7시 자동 실행

on:
  schedule:
    # 한국시간 오전 7시 = UTC 오후 10시 (전날)
    - cron: '0 22 * * *'
  workflow_dispatch:   # 수동 실행 버튼 (테스트용)

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # data.json 을 저장소에 커밋하기 위해 필요

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 스크립트 실행 (수집 + 이메일)
        env:
          GMAIL_USER:       ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:   ${{ secrets.GMAIL_APP_PASS }}
          RECIPIENT_EMAIL:  ${{ secrets.RECIPIENT_EMAIL }}
        run: python fetch_and_email.py

      - name: data.json 을 저장소에 커밋 (웹앱 갱신)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "자동 업데이트: $(date '+%Y-%m-%d') 다이제스트"
          git push
